    - id: "qa-ai"
      name: "Quality Assurance AI"
      department: "technology"
      rank: 55
      description: "Tests every module, strategy, and release before production deployment."
      required_modules:
        - [simulation.core]
        - [core.task]
        - [monitor.system]
      permissions:
        - "test:run"
        - "release:approve"
        - "bug:report"

    - id: "architect-ai"
      name: "Chief Architect AI"
      department: "technology"
      rank: 80
      description: "Guards system architecture — prevents architectural drift, reviews all integrations."
      required_modules:
        - [core.*]
        - [knowledge.os]
      permissions:
        - "architecture:review"
        - "plugin:review"
        - "dependency:approve"
        - "standards:enforce"

    - id: "devops-ai"
      name: "DevOps AI"

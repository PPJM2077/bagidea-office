  # ===========================================================================
  # Communication Protocols
  # ===========================================================================
  # Standardized event types that flow through the Event Bus.
  # ===========================================================================
  protocols:
    event_types:
      - "market.data.updated"
      - "market.regime.changed"
      - "analysis.signal.published"
      - "risk.limit.breached"
      - "risk.safe-mode.activated"
      - "decision.proposed"
      - "decision.approved"
      - "decision.rejected"
      - "order.placed"
      - "order.filled"
      - "order.rejected"
      - "order.cancelled"
      - "portfolio.updated"
      - "portfolio.rebalanced"
      - "portfolio.profit.locked"
      - "strategy.created"
      - "strategy.modified"
      - "strategy.retired"
      - "knowledge.entry.created"
      - "knowledge.fact.verified"
      - "meeting.scheduled"
      - "meeting.minutes.published"
      - "committee.vote.cast"
      - "committee.verdict.reached"
      - "employee.status.changed"
      - "employee.kpi.updated"
      - "incident.reported"
      - "emergency.declared"
      - "system.health.degraded"
      - "system.self-healed"
      - "proposal.submitted"
      - "proposal.approved"
      - "proposal.rejected"
      - "change.rolled-back"

    conversation_modes:
      - "chat"           # One-to-one, DM
      - "channel"        # One-to-many, topic-based
      - "thread"         # Nested conversation
      - "meeting"        # Structured, scheduled
      - "debate"         # Pro/con argumentation
      - "committee"      # Multi-party voting
      - "whisper"        # Private DM
      - "broadcast"      # All-hands announcement
      - "emergency"      # Priority interrupt

    change_levels:
      auto:
        description: "AI adjusts without approval"
        examples: ["cache tuning", "queue prioritization", "load balancing"]
      review:
        description: "AI proposes, committee approves"
        examples: ["strategy weight adjustment", "provider routing"]
      owner_approval:
        description: "Requires founder/human approval"
        examples: ["new strategy deployment", "risk policy change", "new model"]
      locked:
        description: "No AI may modify"
        examples: ["money management core rules", "max drawdown", "API secrets"]

  # ===========================================================================
  # Knowledge Pyramid
  # ===========================================================================
  # Multi-tier knowledge classification from the AI Constitution.
  # ===========================================================================
  knowledge_pyramid:
    tier_0:
      name: "Immutable"
      description: "Core rules — AI may not modify"
      includes:
        - "risk policy constraints"
        - "money management core rules"
        - "broker compliance rules"
        - "portfolio constitution limits"
        - "API secrets & credentials"

    tier_1:
      name: "Official Documentation"
      description: "Authoritative references — AI reads, cannot edit"
      includes:
        - "Python/MQL documentation"
        - "broker specifications"
        - "exchange rules"
        - "MetaTrader5 Python API docs"

    tier_2:
      name: "Internal Knowledge"
      description: "Company-generated knowledge — AI learns from"
      includes:
        - "trading journals"
        - "backtest results"
        - "research papers (internal)"
        - "strategy documentation"
        - "KPIs and performance records"

    tier_3:
      name: "External Academic"
      description: "Published research — useful but unverified"
      includes:
        - "academic papers"
        - "blog posts"
        - "GitHub repositories"
        - "book excerpts"

    tier_4:
      name: "Community"
      description: "Unverified references — use with caution"
      includes:
        - "Reddit discussions"
        - "Discord conversations"
        - "Twitter/X threads"
        - "forum posts"

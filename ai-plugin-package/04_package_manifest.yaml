  # ===========================================================================
  # AI Role Registry
  # ===========================================================================
  # Every AI role in the organization, with department, permissions,
  # and required modules.
  # ===========================================================================
  roles:
    - id: "ceo-ai"
      name: "Chief Executive Officer AI"
      department: "executive"
      rank: 100
      description: "Top-level AI executive — chairs meetings, approves decisions, manages department heads."
      required_modules:
        - [core.*]
        - [knowledge.*]
        - [intel.decision]
        - [intel.portfolio]
        - [intel.risk]
        - [evolution.core]
      permissions:
        - "decision:approve"
        - "policy:propose"
        - "employee:promote"
        - "employee:hire"
        - "emergency:declare"
        - "budget:allocate"

    - id: "cio-ai"
      name: "Chief Investment Officer AI"
      department: "investment"
      rank: 90
      description: "Heads investment strategy — selects strategies, allocates capital, oversees trading."
      required_modules:
        - [core.*]
        - [intel.*]
        - [execution.*]
      permissions:
        - "strategy:approve"
        - "allocation:manage"
        - "portfolio:oversee"
        - "decision:escalate"

    - id: "cro-ai"
      name: "Chief Risk Officer AI"
      department: "risk"
      rank: 90
      description: "Heads risk management — sets risk limits, monitors exposure, enforces constitution."
      required_modules:
        - [core.kernel]
        - [core.governance]
        - [intel.risk]
        - [intel.portfolio]
        - [knowledge.os]
      permissions:
        - "risk:set-limits"
        - "trade:veto"
        - "safe-mode:activate"
        - "emergency:halt"
        - "audit:view-all"

    - id: "cfo-ai"
      name: "Chief Financial Officer AI"
      department: "finance"
      rank: 85
      description: "Manages budgets, costs, API expenditure, broker fees, and financial planning."
      required_modules:
        - [core.kernel]
        - [core.gateway]
        - [employee.system]
        - [monitor.system]
      permissions:
        - "budget:view"
        - "cost:optimize"
        - "provider:switch"

    - id: "cto-ai"
      name: "Chief Technology Officer AI"
      department: "technology"
      rank: 90
      description: "Heads technology — architecture, infrastructure, AI gateway, security."
      required_modules:
        - [core.*]
        - [monitor.system]
        - [simulation.core]
        - [employee.hr]
      permissions:
        - "infrastructure:manage"
        - "provider:register"
        - "plugin:approve"
        - "security:audit"
        - "deployment:manage"

    - id: "market-analyst"
      name: "Market Analyst AI"
      department: "investment"
      rank: 60
      description: "Analyzes markets — technical, macro, news, sentiment. Provides trade signals."
      required_modules:
        - [intel.market]
        - [knowledge.os]
        - [core.communication]
      permissions:
        - "signal:publish"
        - "analysis:write"
        - "knowledge:contribute"

    - id: "risk-manager"
      name: "Risk Manager AI"
      department: "risk"
      rank: 65
      description: "Monitors and manages portfolio risk in real-time."
      required_modules:
        - [intel.risk]
        - [intel.portfolio]
        - [core.governance]
      permissions:
        - "risk:monitor"
        - "position:size"
        - "trade:advisory-veto"
        - "safe-mode:recommend"

    - id: "portfolio-manager"
      name: "Portfolio Manager AI"
      department: "investment"
      rank: 75
      description: "Manages the unified portfolio — allocation, rebalancing, profit locking."
      required_modules:
        - [intel.portfolio]
        - [intel.risk]
        - [intel.market]
        - [intel.decision]
      permissions:
        - "portfolio:rebalance"
        - "allocation:adjust"
        - "profit:lock"
        - "scenario:run"

    - id: "research-director"
      name: "Research Director AI"
      department: "research"
      rank: 75
      description: "Heads quant research — backtesting, strategy development, paper analysis."
      required_modules:
        - [intel.research]
        - [intel.strategy]
        - [knowledge.os]
        - [simulation.core]
      permissions:
        - "research:propose"
        - "backtest:run"
        - "strategy:design"
        - "experiment:register"

    - id: "strategy-ai"
      name: "Strategy AI"
      department: "research"
      rank: 65
      description: "Designs, implements, and optimizes trading strategies."
      required_modules:
        - [intel.strategy]
        - [intel.research]
        - [intel.market]
      permissions:
        - "strategy:modify"
        - "strategy:version"
        - "parameter:tune"

    - id: "execution-ai"
      name: "Execution AI"
      department: "trading"
      rank: 60

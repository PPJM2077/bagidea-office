# =============================================================================
# Company Simulator — pytest Configuration
# Reference: qa-standards.md §4 (Testing Standards), §7 (Automation Standards)
# =============================================================================

[pytest]

# ─── Paths ──────────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ─── Core plugins ───────────────────────────────────────────────────────────
asyncio_mode = auto

# ─── Options ────────────────────────────────────────────────────────────────
# -xvs: stop on first failure, verbose, no capture (useful locally)
addopts =
    --strict-markers
    --tb=short
    --no-header

# ─── Markers (register all custom markers here) ─────────────────────────────
# per qa-standards §4 — markers allow filtering test types in CI
markers =
    unit: Unit tests — no I/O, fast, pure logic (qa-standards §6.1)
    integration: Integration tests — DB, API, service-to-service (qa-standards §6.2)
    e2e: End-to-end tests — full user journey (qa-standards §6.3)
    smoke: Smoke tests — critical path sanity (qa-standards §9.1)
    slow: Tests that take > 1s — excluded from default runs
    flaky: Temporarily allowed flaky tests — MUST reference a ticket
    serial: Tests that cannot run in parallel (shared resource)

# ─── Filter warnings ────────────────────────────────────────────────────────
filterwarnings =
    error
    # Pydantic v2 warns about V1 validators — acceptable
    ignore::UserWarning:pydantic.*
    # RUF100 from ruff
    ignore::FutureWarning
    # Async warning for test cleanup
    ignore::DeprecationWarning:pytest_asyncio.*

# ─── Logging ────────────────────────────────────────────────────────────────
log_cli_level = INFO
log_level = DEBUG
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S

# ─── xfail strict — unexpected pass = test failure ──────────────────────────
xfail_strict = true

# ─── Required minimum pytest version ────────────────────────────────────────
minversion = 8.0

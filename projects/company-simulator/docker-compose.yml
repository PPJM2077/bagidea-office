version: "3.9"

# =============================================================================
# Company Simulator — Dev Environment
# Services: PostgreSQL + pgvector, Redis, NATS (JetStream), Qdrant, Neo4j
# =============================================================================

name: company-simulator-dev

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ─── PostgreSQL 16 + pgvector ──────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cs-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-company_simulator}"
      POSTGRES_USER: "${POSTGRES_USER:-cs_user}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cs_dev_pass}"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cs_user} -d ${POSTGRES_DB:-company_simulator}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging: *default-logging
    networks:
      - cs-net

  # ─── Redis 7.2 ─────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: cs-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command:
      - redis-server
      - --save 300 10
      - --appendonly yes
      - --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging
    networks:
      - cs-net

  # ─── NATS Latest (JetStream + Leafnodes) ──────────────────────────────
  nats:
    image: nats:latest
    container_name: cs-nats
    restart: unless-stopped
    ports:
      - "${NATS_CLIENT_PORT:-4222}:4222"   # Client connections
      - "${NATS_HTTP_PORT:-8222}:8222"     # HTTP monitoring
    command:
      - -c /etc/nats/nats.conf
    volumes:
      - nats-data:/data
      - ./docker-compose/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nats server check connection -A || wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - cs-net

  # ─── Qdrant 1.10 ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.10
    container_name: cs-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # gRPC / REST API
      - "${QDRANT_GRPC_PORT:-6334}:6334"  # Internal gRPC
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: "${QDRANT_LOG_LEVEL:-INFO}"
    volumes:
      - qdrant-data:/qdrant/storage
      - ./init/qdrant:/qdrant/config:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging
    networks:
      - cs-net

  # ─── Neo4j 5 (Knowledge Graph) ────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: cs-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"   # Bolt protocol
      - "${NEO4J_HTTP_PORT:-7474}:7474"   # HTTP browser
    environment:
      NEO4J_AUTH: "${NEO4J_AUTH:-neo4j/cs_dev_pass}"
      NEO4J_dbms_memory_pagecache_size: "${NEO4J_PAGECACHE:-512M}"
      NEO4J_dbms_memory_heap_max__size: "${NEO4J_HEAP:-1G}"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./init/neo4j:/import:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s
    logging: *default-logging
    networks:
      - cs-net

  # ─── API (FastAPI) — uncomment when app code exists ────────────────────
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: cs-api
  #   restart: unless-stopped
  #   ports:
  #     - "${API_PORT:-8000}:8000"
  #   env_file:
  #     - .env
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #     nats:
  #       condition: service_healthy
  #     qdrant:
  #       condition: service_healthy
  #     neo4j:
  #       condition: service_healthy
  #   volumes:
  #     - .:/app
  #   command: >
  #     uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  #   logging: *default-logging
  #   networks:
  #     - cs-net

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  nats-data:
    driver: local
  qdrant-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local

networks:
  cs-net:
    driver: bridge

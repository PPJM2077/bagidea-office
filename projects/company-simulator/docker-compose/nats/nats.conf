# =============================================================================
# NATS JetStream Configuration — Company Simulator
# =============================================================================

# ─── Server identity ────────────────────────────────────────────────────────
server_name: cs-nats
host: 0.0.0.0
port: 4222
monitoring_port: 8222

# ─── Logging ────────────────────────────────────────────────────────────────
loglevel: warn

# ─── JetStream ──────────────────────────────────────────────────────────────
jetstream {
  # Store directory (mounted volume)
  store_dir: /data

  # Max memory per JetStream (0 = unlimited)
  max_memory_store: 0

  # Max file store (0 = unlimited, capped by volume)
  max_file_store: 0

  # Enable domain for cross-domain replication (agent clusters)
  # domain: "cs-agents"
}

# ─── Leafnodes — Agent-to-Agent Messaging ──────────────────────────────────
#
# Leafnode connections allow other NATS servers (agents, workers, edge nodes)
# to join this topology without needing full mesh routes. Each agent process
# or worker pool connects as a leafnode, inheriting all JetStream subjects.
#
# When deploying agent workers remotely, set a shared auth token:
#   docker compose exec nats nats server passwd <token>
# Then configure the remote leafnode with the same token.
#
leafnodes {
  # Port for inbound leafnode connections
  port: 7422

  # Deny leafnode connections without this token
  # (set NATS_LEAFNODE_TOKEN in .env for production)
  authorization {
    token: "${NATS_LEAFNODE_TOKEN}"
    # Or use a time-limited token:
    # timeout: 10.0
  }

  # Advertise this server's leafnode address for other servers to connect
  # host: "cs-nats"
  # advertise: "cs-nats:7422"
}

# ─── Subject mappings (agent routing) ──────────────────────────────────────
#
# Agent worker subjects — each worker pool picks up jobs from its inbox:
#   agent.<pool_id>.inbox      — task dispatch
#   agent.<pool_id>.result     — result publishing
#   agent.<pool_id>.heartbeat  — liveness pings
#
# All are backed by JetStream for durable delivery.

# ─── Authorization (optional) ──────────────────────────────────────────────
# authorization {
#   # Default user permissions
#   default_permissions {
#     publish:   ">"
#     subscribe: ">"
#   }
# }
